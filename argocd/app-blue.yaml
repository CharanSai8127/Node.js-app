apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: app-blue
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "4"
spec:
  project: default
  source:
    repoURL: https://github.com/CharanSai8127/Node.js-app.git
    targetRevision: HEAD
    path: application/blue
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
