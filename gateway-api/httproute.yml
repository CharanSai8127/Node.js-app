apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: app-route
  namespace: default
spec:
  parentRefs:
  - name: nginx-gateway
    namespace: nginx-gateway

  hostnames:
  - "app.example.com"

  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /

    backendRefs:
    - name: app-service-blue
      port: 80
      weight: 100   # initial traffic to blue

    - name: app-service-green
      port: 80
      weight: 0     # green receives no traffic initially
